channels:
  router:
    base_url: http://localhost:20128
    auth_env: ANTHROPIC_API_KEY
    prefix: cc/
    also_serves:
    - minimax-code
  gemini_cli:
    binary: gemini
    prefix: ''
  copilot_cli:
    binary: copilot
    prefix: gh/
models:
  cc/claude-sonnet-4-6:
    channel: router
    tier: premium
    cost_hint: high
  cc/claude-sonnet-4-5:
    channel: router
    tier: premium
    cost_hint: high
  cc/claude-opus-4-6:
    channel: router
    tier: ultra
    cost_hint: very-high
  cc/claude-haiku-4-5:
    channel: router
    tier: fast
    cost_hint: low
  minimax-code:
    channel: router
    tier: cheap
    strengths:
    - code
    - draft
    - fast
    cost_hint: medium-low
  gh/gpt-5.3-codex:
    channel: copilot_cli
    tier: code-review
    strengths:
    - code
    - code-review
    - ui-ux
    - repo-aware
    cost_hint: medium
  gh/claude-haiku-4-5:
    channel: copilot_cli
    tier: fast
    cost_hint: low
  gemini-pro:
    channel: gemini_cli
    tier: analysis
    strengths:
    - long-context
    - 1M-tokens
    cost_hint: medium
  gemini-flash:
    channel: gemini_cli
    tier: fast-analysis
    cost_hint: low
  gempro:
    channel: router
    tier: premium
    strengths:
    - architecture
    - system-design
    - requirements
    - deep-reasoning
    cost_hint: medium-high
    note: Maps to gemini-2.5-pro in gemini-cli config
  gemmed:
    channel: router
    tier: medium
    strengths:
    - code
    - refactor
    - review
    - tests
    - implementation
    cost_hint: medium-low
    note: Maps to gemini-2.5-flash or configurable in gemini-cli
  gemlow:
    channel: router
    tier: fast
    strengths:
    - quick-answer
    - summarize
    - classify
    cost_hint: low
    note: Maps to fastest available in gemini-cli
task_mapping:
  quick_answer:
    parallel:
    - gemini-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
    rationale: gemini-low handles fast classification; minimax as backup.
  summarize:
    parallel:
    - gemini-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
    note: minimax-code is last-resort backup for all task types
  classify_intent:
    parallel:
    - gemini-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
  implement_feature:
    parallel:
    - gemini-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
    rationale: gemini-medium for coding; copilot for repo context; Claude premium
      as safety net; minimax-code as last resort.
  fix_bug:
    parallel:
    - gemini-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
  refactor_code:
    parallel:
    - gemini-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
  write_tests:
    parallel:
    - gemini-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-5
    - cc/claude-sonnet-4-6
    rationale: gemini-medium handles test generation; copilot for repo-aware tests;
      minimax-code last resort.
  code_review:
    parallel:
    - gemini-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    rationale: gemini-medium for review; copilot for repo context; minimax-code as
      backup.
  ui_ux_review:
    parallel:
    - gemini-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
  architecture_analysis:
    consensus: true
    parallel:
    - gemini-pro
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - cc/claude-opus-4-6
    rationale: gemini-pro for deep architecture reasoning; Claude Sonnet as parallel
      option; minimax-code last resort.
  security_audit:
    consensus: true
    parallel:
    - gemini-pro
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - cc/claude-opus-4-6
    rationale: gemini-pro for deep security analysis; Claude Sonnet as parallel option; minimax-code last resort.
  analyze_requirements:
    parallel:
    - gemini-pro
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
    rationale: gemini-pro handles requirements analysis; Claude premium as safety
      net; minimax-code last resort.
  create_user_stories:
    parallel:
    - gemini-pro
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
  design_api:
    consensus: true
    parallel:
    - gemini-pro
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - cc/claude-opus-4-6
    rationale: gemini-pro for API design; Claude Sonnet as parallel option; minimax-code
      as backup.
  system_design:
    parallel:
    - gemini-pro
    - minimax-code
    fallback:
    - cc/claude-opus-4-6
    - cc/claude-sonnet-4-6
    rationale: gemini-pro for whole-system design; Claude Opus as premium backup;
      minimax-code last resort.
  write_dockerfile:
    parallel:
    - gemini-medium
    - cc/claude-sonnet-4-5
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
  setup_ci_cd:
    parallel:
    - gemini-medium
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-5
  repo_analysis:
    parallel:
    - gemini-pro
    - minimax-code
    fallback:
    - cc/claude-opus-4-6
    - cc/claude-sonnet-4-6
    rationale: 1M-token context — feed whole repo; minimax-code as last resort.
  default:
    parallel:
    - gemini-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
    - cc/claude-sonnet-4-5
parallel_policy:
  pick_strategy: consensus
  max_parallel: 3
  cancel_slower_on_first_success: true
  timeout_per_model_sec: 120
router_hints:
  round_robin_accounts: true
  respect_quota: true
  prefer_cheaper_on_tie: true
  circuit_breaker_threshold: 3
  circuit_breaker_cooldown_sec: 60
