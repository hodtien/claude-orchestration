channels:
  router:
    base_url: http://localhost:20128
    auth_env: ANTHROPIC_API_KEY
    prefix: cc/
    also_serves:
    - minimax-code
    - oc-high
    - oc-medium
    - oc-low
    - claude-review
    - claude-architect
    - claude-review-backup
    - claude-architect-backup
  gemini_cli:
    binary: gemini
    prefix: ''
  copilot_cli:
    binary: copilot
    prefix: gh/
models:
  cc/claude-sonnet-4-6:
    channel: router
    tier: premium
    cost_hint: high
  cc/claude-sonnet-4-5:
    channel: router
    tier: premium
    cost_hint: high
  cc/claude-opus-4-6:
    channel: router
    tier: ultra
    cost_hint: very-high
  cc/claude-haiku-4-5:
    channel: router
    tier: fast
    cost_hint: low
  minimax-code:
    channel: router
    tier: cheap
    strengths:
    - code
    - draft
    - fast
    cost_hint: medium-low
  gh/gpt-5.3-codex:
    channel: copilot_cli
    tier: code-review
    strengths:
    - code
    - code-review
    - ui-ux
    - repo-aware
    cost_hint: medium
  gh/claude-haiku-4-5:
    channel: copilot_cli
    tier: fast
    cost_hint: low
  gemini-pro:
    channel: gemini_cli
    tier: analysis
    strengths:
    - long-context
    - 1M-tokens
    cost_hint: medium
  gemini-flash:
    channel: gemini_cli
    tier: fast-analysis
    cost_hint: low
  oc-high:
    channel: router
    tier: premium
    strengths:
    - architecture
    - system-design
    - requirements
    - deep-reasoning
    cost_hint: medium-high
    note: Maps to gemini-2.5-pro in gemini-cli config
  oc-medium:
    channel: router
    tier: medium
    strengths:
    - code
    - refactor
    - review
    - tests
    - implementation
    cost_hint: medium-low
    note: Maps to gemini-2.5-flash or configurable in gemini-cli
  oc-low:
    channel: router
    tier: fast
    strengths:
    - quick-answer
    - summarize
    - classify
    cost_hint: low
    note: Maps to fastest available in gemini-cli
  claude-review:
    channel: router
    tier: code-review
    strengths:
    - code
    - code-review
    - refactor
    - repo-aware
    cost_hint: medium
    note: Primary reviewer slot in consensus code_review / refactor / fix_bug / write_tests.
  claude-review-backup:
    channel: router
    tier: code-review
    strengths:
    - code
    - code-review
    - refactor
    cost_hint: medium
    note: Failover for claude-review (same tier, different upstream account/quota).
  claude-architect:
    channel: router
    tier: premium
    strengths:
    - architecture
    - system-design
    - security-audit
    - api-design
    - deep-reasoning
    cost_hint: medium-high
    note: Primary architect slot — replaces gemini-pro in heavy reasoning / design / security tasks.
  claude-architect-backup:
    channel: router
    tier: premium
    strengths:
    - architecture
    - system-design
    - security-audit
    - api-design
    - deep-reasoning
    cost_hint: medium-high
    note: Failover for claude-architect (same tier, different upstream account/quota).
task_mapping:
  quick_answer:
    parallel:
    - oc-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
    rationale: oc-low handles fast classification; minimax as backup.
  summarize:
    parallel:
    - oc-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
    note: minimax-code is last-resort backup for all task types
  classify_intent:
    parallel:
    - oc-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
  implement_feature:
    parallel:
    - oc-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
    rationale: oc-medium for coding; copilot for repo context; Claude premium
      as safety net; minimax-code as last resort.
  fix_bug:
    parallel:
    - oc-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
  refactor_code:
    parallel:
    - oc-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
  write_tests:
    parallel:
    - oc-medium
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-5
    - cc/claude-sonnet-4-6
    rationale: oc-medium handles test generation; copilot for repo-aware tests;
      minimax-code last resort.
  code_review:
    consensus: true
    parallel:
    - claude-review
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - claude-review-backup
    - cc/claude-sonnet-4-6
    rationale: claude-review as primary reviewer; copilot for repo context; minimax-code
      as backup. claude-review-backup failover if claude-review rate-limited.
  ui_ux_review:
    parallel:
    - claude-review
    - gh/gpt-5.3-codex
    - minimax-code
    fallback:
    - claude-review-backup
    - cc/claude-sonnet-4-6
  architecture_analysis:
    consensus: true
    parallel:
    - claude-architect
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - claude-architect-backup
    - cc/claude-opus-4-6
    rationale: claude-architect for deep architecture reasoning; Claude Sonnet as
      parallel option; minimax-code last resort. claude-architect-backup failover
      if primary rate-limited.
  security_audit:
    consensus: true
    parallel:
    - claude-architect
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - claude-architect-backup
    - cc/claude-opus-4-6
    rationale: claude-architect for deep security analysis; Claude Sonnet as parallel
      option; minimax-code last resort. claude-architect-backup failover if primary
      rate-limited.
  analyze_requirements:
    parallel:
    - oc-high
    - minimax-code
    fallback:
    - claude-architect
    - cc/claude-sonnet-4-6
    - cc/claude-opus-4-6
    rationale: oc-high for requirements analysis (lighter than claude-architect);
      claude-architect as premium fallback; minimax-code last resort.
  create_user_stories:
    parallel:
    - oc-high
    - minimax-code
    fallback:
    - claude-architect
    - cc/claude-sonnet-4-6
  design_api:
    consensus: true
    parallel:
    - claude-architect
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - claude-architect-backup
    - cc/claude-opus-4-6
    rationale: claude-architect for API design; Claude Sonnet as parallel option;
      minimax-code as backup. claude-architect-backup failover if primary rate-limited.
  system_design:
    parallel:
    - claude-architect
    - minimax-code
    fallback:
    - claude-architect-backup
    - cc/claude-opus-4-6
    - cc/claude-sonnet-4-6
    rationale: claude-architect for whole-system design; Claude Opus as premium
      backup; minimax-code last resort.
  write_dockerfile:
    parallel:
    - oc-medium
    - cc/claude-sonnet-4-5
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-6
  setup_ci_cd:
    parallel:
    - oc-medium
    - cc/claude-sonnet-4-6
    - minimax-code
    fallback:
    - cc/claude-sonnet-4-5
  repo_analysis:
    parallel:
    - claude-architect
    - minimax-code
    fallback:
    - claude-architect-backup
    - cc/claude-opus-4-6
    - cc/claude-sonnet-4-6
    rationale: claude-architect for whole-repo analysis; claude-architect-backup
      failover; Claude Opus premium fallback; minimax-code last resort. NOTE
      context window ≠ gemini-pro 1M — if routed workload truly needs 1M tokens,
      use gemini-pro directly via route_task.
  default:
    parallel:
    - oc-low
    - minimax-code
    fallback:
    - cc/claude-haiku-4-5
    - cc/claude-sonnet-4-5
parallel_policy:
  pick_strategy: consensus
  max_parallel: 3
  cancel_slower_on_first_success: true
  timeout_per_model_sec: 120
  sim_threshold: 0.3
router_hints:
  round_robin_accounts: true
  respect_quota: true
  prefer_cheaper_on_tie: true
  circuit_breaker_threshold: 3
  circuit_breaker_cooldown_sec: 60
