# .orchestration/notify.conf u2014 Notification routing for claude-orchestration
# Uncomment and configure sections to enable notification channels.

# Global toggle (set to false to silence all notifications except file channel)
# enabled: true

# Minimum severity level: info | warn | error
# min_severity: info

# Per-event enable flags
events:
  batch_complete: true
  batch_partial_failure: true
  task_failed: false
  slo_breach: true
  circuit_open: true
  scheduled_dispatch: false

channels:
  # Slack incoming webhook
  # - type: slack
  #   name: ops-alerts
  #   webhook_url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
  #   channel: "#orch-alerts"
  #   events: [batch_complete, task_failed, circuit_open]
  #   min_severity: warn

  # Generic HTTP webhook
  # - type: webhook
  #   name: pagerduty
  #   url: https://events.example.com/ingest
  #   headers:
  #     Authorization: Bearer YOUR_TOKEN
  #   events: [circuit_open, task_failed]

  # File log (always-on audit trail)
  - type: file
    name: local-audit
    path: .orchestration/notifications.log
    events: [all]
    enabled: true
