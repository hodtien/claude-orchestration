name: Orchestration Health

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install --global --no-audit --no-fund @github/copilot

      - name: Install Gemini CLI (optional)
        if: ${{ env.GEMINI_API_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          npm install --global --no-audit --no-fund @google/gemini-cli

      - name: Run health beacon (JSON)
        shell: bash
        run: |
          set -euo pipefail
          bash ./bin/orch-health-beacon.sh --json > health.json

      - name: Run due scheduled tasks
        id: run_due
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          bash ./bin/task-schedule.sh run-due

      - name: Generate health summary
        id: summarize
        shell: bash
        env:
          RUN_DUE_OUTCOME: ${{ steps.run_due.outcome }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          with open("health.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          agents = data.get("agents", {})
          if not isinstance(agents, dict):
              agents = {}

          rows = sorted(agents.items())
          down = [(name, metrics) for name, metrics in rows if metrics.get("status") == "DOWN"]
          degraded = [(name, metrics) for name, metrics in rows if metrics.get("status") == "DEGRADED"]

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Orchestration Health\n\n")
              summary.write(f"- Generated at: `{data.get('generated_at', 'n/a')}`\n")
              summary.write(f"- Window (s): `{data.get('window_s', 'n/a')}`\n")
              summary.write(f"- Agents tracked: `{len(rows)}`\n")
              summary.write(f"- DOWN: `{len(down)}` | DEGRADED: `{len(degraded)}`\n\n")
              summary.write(f"- Scheduled dispatch (`run-due`): `{os.environ.get('RUN_DUE_OUTCOME', 'unknown')}`\n\n")

              if rows:
                  summary.write("| Agent | Status | Total Calls | Failed Calls | Failure Rate |\n")
                  summary.write("|---|---|---:|---:|---:|\n")
                  for name, metrics in rows:
                      summary.write(
                          f"| {name} | {metrics.get('status', 'UNKNOWN')} | "
                          f"{metrics.get('total_calls', 0)} | {metrics.get('failed_calls', 0)} | "
                          f"{metrics.get('failure_rate', 0)}% |\n"
                      )
              else:
                  summary.write("_No complete events found in the current window._\n")

          issue_body = (
              "# Orchestration health alert\n\n"
              f"- Repository: `{os.environ.get('GITHUB_REPOSITORY', '')}`\n"
              f"- Workflow run: `{os.environ.get('GITHUB_RUN_ID', '')}`\n"
              f"- Generated at: `{datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')}`\n\n"
              "## DOWN agents\n\n"
              + ("\n".join(f"- `{name}`" for name, _ in down) if down else "- None")
              + "\n\n## Full health JSON\n\n```json\n"
              + json.dumps(data, indent=2, sort_keys=True)
              + "\n```\n"
          )
          with open("health-issue.md", "w", encoding="utf-8") as f:
              f.write(issue_body)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"any_down={'true' if down else 'false'}\n")
          PY

      - name: Create issue when agent is DOWN
        if: steps.summarize.outputs.any_down == 'true'
        shell: bash
        run: |
          set -euo pipefail
          gh auth status
          gh issue create \
            --title "Orchestration health alert (${GITHUB_REPOSITORY}) run ${GITHUB_RUN_ID}" \
            --body-file health-issue.md
